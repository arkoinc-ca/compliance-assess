name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string
      notes:
        description: "Release notes (brief summary)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Pre-release Tests
    uses: ./.github/workflows/test.yaml

  build-sbom:
    name: Build and Generate SBOM
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write  # required for attest-build-provenance
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2  # TODO(P0-08): verify SHA

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0  # TODO(P0-08): verify SHA
        with:
          python-version: "3.11"

      - name: Install syft
        # TODO(P0-08): bump syft pin when a newer tag is verified.
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/v1.16.0/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate CycloneDX SBOM
        run: syft . -o cyclonedx-json=sbom.cdx.json

      - name: Generate SPDX SBOM
        run: syft . -o spdx-json=sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aad26d7c8b852afdb # v2.1.0  # TODO(P0-08): verify SHA
        with:
          subject-path: |
            sbom.cdx.json
            sbom.spdx.json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3  # TODO(P0-08): verify SHA
        with:
          name: sboms
          path: |
            sbom.cdx.json
            sbom.spdx.json

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-sbom
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2  # TODO(P0-08): verify SHA

      - name: Download SBOMs
        uses: actions/download-artifact@fa0a91b85d4f404e444306234b9d55e8a3ca7f0d # v4.1.8  # TODO(P0-08): verify SHA
        with:
          name: sboms

      - name: Create tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.tag }}" -m "Release ${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"

      - name: Create GitHub release with SBOMs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release create "$TAG" \
            sbom.cdx.json sbom.spdx.json \
            --title "$TAG" \
            --notes "${{ inputs.notes || format('Release {0}', github.ref_name) }}" \
            --verify-tag
