name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-assess-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2  # TODO(P0-08): verify SHA

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0  # TODO(P0-08): verify SHA
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pytest with coverage
        run: uv run pytest -v --cov --cov-report=term-missing --cov-report=xml

      - name: Assert pytest collects at least 14 tests (A-H5)
        run: |
          COUNT=$(uv run pytest --collect-only -q 2>&1 | grep -c "::" || true)
          echo "Collected test count: ${COUNT}"
          if [ "${COUNT}" -lt 14 ]; then
            echo "::error::pytest collected only ${COUNT} tests; minimum required is 14 (A-H5)"
            exit 1
          fi

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3  # TODO(P0-08): verify SHA
        with:
          name: coverage-report
          path: coverage.xml
